<!DOCTYPE html>
<html lang="en">
<head>
  <!-- STEP 1: Change the title (what shows in the browser tab) -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoCodeGirl - My Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation bar - appears on every page -->
  <header>
    <nav>
      <a href="index.html" class="nav-link active">Home</a>
      <a href="fun-facts.html" class="nav-link">Fun Facts</a>
      <a href="collage.html" class="nav-link">Photo Collage</a>
      <a href="quiz/quiz.html" class="nav-link">Quiz</a>
    </nav>

  <main>
    <!-- ID Card Section -->
    <div class="id-card">
      <!-- STEP 2: Add your profile picture here -->
      <img src="https://placehold.co/200x200/06b6d4/white?text=Your+Photo" alt="Profile picture" class="profile-pic">

      <!-- STEP 3: Change your name -->
      <h1>Your Name Here</h1>

      <!-- STEP 4: Write a short bio about yourself -->
      <p class="bio">This is where you tell people about yourself. What makes you awesome?</p>

      <!-- Extra info lines -->
      <p class="info-line">Location: Add your city or town</p>
      <p class="info-line">Favorite thing: What do you love to do?</p>
    </div>

    <!-- STEP 5: Add a new section about your interests, hobbies, or anything else -->

  </main>

  <footer>
    <p>Created by [Your Name]</p>
  </footer>
</body>
</html>
